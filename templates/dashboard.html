<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>

        /* From Uiverse.io by doniaskima */ 
        .btn-53,
        .btn-53 *,
        .btn-53 :after,
        .btn-53 :before,
        .btn-53:after,
        .btn-53:before {
        border: 0 solid;
        box-sizing: border-box;
        }

        .btn-53 {
        -webkit-tap-highlight-color: transparent;
        -webkit-appearance: button;
        background-color: #000;
        background-image: none;
        color: #fff;
        cursor: pointer;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
            Segoe UI, Roboto, Helvetica Neue, Arial, Noto Sans, sans-serif,
            Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol, Noto Color Emoji;
        font-size: 100%;
        line-height: 1.5;
        margin: 0;
        -webkit-mask-image: -webkit-radial-gradient(#000, #fff);
        padding: 0;
        }

        .btn-53:disabled {
        cursor: default;
        }

        .btn-53:-moz-focusring {
        outline: auto;
        }

        .btn-53 svg {
        display: block;
        vertical-align: middle;
        }

        .btn-53 [hidden] {
        display: none;
        }

        .btn-53 {
        border: 1px solid;
        border-radius: 999px;
        box-sizing: border-box;
        display: block;
        font-weight: 900;
        overflow: hidden;
        padding: 1.2rem 3rem;
        position: relative;
        text-transform: uppercase;
        }

        .btn-53 .original {
        background: #fff;
        color: #000;
        display: grid;
        inset: 0;
        place-content: center;
        position: absolute;
        transition: transform 0.2s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .btn-53:hover .original {
        transform: translateY(100%);
        }

        .btn-53 .letters {
        display: inline-flex;
        }

        .btn-53 span {
        opacity: 0;
        transform: translateY(-15px);
        transition: transform 0.2s cubic-bezier(0.87, 0, 0.13, 1), opacity 0.2s;
        }

        .btn-53 span:nth-child(2n) {
        transform: translateY(15px);
        }

        .btn-53:hover span {
        opacity: 1;
        transform: translateY(0);
        }

        .btn-53:hover span:nth-child(2) {
        transition-delay: 0.1s;
        }

        .btn-53:hover span:nth-child(3) {
        transition-delay: 0.2s;
        }

        .btn-53:hover span:nth-child(4) {
        transition-delay: 0.3s;
        }

        .btn-53:hover span:nth-child(5) {
        transition-delay: 0.4s;
        }

        .btn-53:hover span:nth-child(6) {
        transition-delay: 0.5s;
        }

        input{
            width:90%;
            font-size: 50px;
            background-color: rgb(200, 244, 200);
            color:rgb(0, 0, 0);
            border-radius: 20px;
        }
        h1{
            color:yellowgreen;
            font-size: 150px;
        }
         /* From Uiverse.io by Voxybuns */ 
        .new {
        /* Variables */
        --button_radius: 0.75em;
        --button_color: #e8e8e8;
        --button_outline_color: #000000;
        font-size: 17px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        border-radius: var(--button_radius);
        background: var(--button_outline_color);
        margin-top:8px;
        }

        .button_top {
        display: block;
        box-sizing: border-box;
        border: 2px solid var(--button_outline_color);
        border-radius: var(--button_radius);
        padding: 0.75em 1.5em;
        background: var(--button_color);
        color: var(--button_outline_color);
        transform: translateY(-0.2em);
        transition: transform 0.1s ease;
        }

        .new:hover .button_top {
        /* Pull the button upwards when hovered */
        transform: translateY(-0.33em);
        }

        .new:active .button_top {
        /* Push the button downwards when pressed */
        transform: translateY(0);
        }
    </style>
</head>
<body style="background-color: rgb(0, 77, 0);">
    <center>
    <form class="in" method="POST" action="/link">
        <h1>Enter your github url:</h1> <br>
        <input name='url' type="url" placeholder="https://github.com/user/repo"/><br><br><br>
        <!-- From Uiverse.io by doniaskima --> 
        <button class="btn-53" type="submit">
        <div class="original">
            hello
        </div>
        <div class="letters">
            
            <span>E</span>
            <span>N</span>
            <span>T</span>
            <span>E</span>
            <span>R</span>
        </div>
        </button>

    </form>
    </center>
</body>
</html>
