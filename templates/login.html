<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Joti+One&display=swap" rel="stylesheet">
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f3f4f6;
    }


        /* From Uiverse.io by Voxybuns */ 
    .new {
    /* Variables */
    --button_radius: 0.75em;
    --button_color: #e8e8e8;
    --button_outline_color: #000000;
    font-size: 17px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: var(--button_radius);
    background: var(--button_outline_color);
    margin-top:8px;
    }

    .button_top {
    display: block;
    box-sizing: border-box;
    border: 2px solid var(--button_outline_color);
    border-radius: var(--button_radius);
    padding: 0.75em 1.5em;
    background: var(--button_color);
    color: var(--button_outline_color);
    transform: translateY(-0.2em);
    transition: transform 0.1s ease;
    }

    .new:hover .button_top {
    /* Pull the button upwards when hovered */
    transform: translateY(-0.33em);
    }

    .new:active .button_top {
    /* Push the button downwards when pressed */
    transform: translateY(0);
    }

    .container{
        width: 30%;
        max-width: 380px;
        background-image: url('/static/c.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        padding: 45px;
        border-radius: 24px;
        backdrop-filter: blur(8px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    h1{
        text-align:center;
        font-size:1.7rem;
        color:#111827;
        margin-bottom:4px;
    }

    .subtitle{
        text-align:center;
        color:#b9c6e2;
        font-size:0.9rem;
        margin-bottom:30px;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:6px;
        font-size:0.9rem;
        font-weight:800;
        color:#ffffff;
        -webkit-text-stroke: 0.5px rgb(0, 0, 0); 
    }

    input{
        width:100%;
        padding:12px 16px;
        background-color: antiquewhite;
        border:1px solid #d1d5db;
        border-radius:14px;
        font-size:0.95rem;
        outline:none;
        transition:0.2s ease;
    }

    input:focus{
        border-color:#2563eb;
        box-shadow:0 0 0 3px rgba(37,99,235,0.15);
    }

    .btn-primary{
        align-items: center;
        width:50%;
        padding:12px;
        border-radius:14px;
        font-size:0.95rem;
        font-weight:600;
        background-color: rgb(25, 35, 175);
        color:white;
        border: none;
    }

    .btn-primary:hover{
        background-color: rgb(28, 193, 86);
        cursor:pointer;
        transition-duration:0.34s;
    }

    .btn-primary{
        margin-top:8px;
    }

    .footer{
        text-align:center;
        margin-top:20px;
        color:#cbced4;
        font-size:0.9rem;
    }

    .joti-one-regular {
    font-family: "Joti One", serif;
    font-weight: 400;
    font-style: normal;
    font-size: 40px;
    -webkit-text-stroke: 0.2px rgb(0, 0, 0); 
    color:rgb(255, 255, 255);
    }

    </style>

</head>
<body style="
    margin: 0;

    background-image: url('/static/bb.webp');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
">

<div class="container">

    <h1 class="joti-one-regular">Welcome bro☄️</h1>
    <p class="subtitle">Enter your credentials to continue</p>

    <form action="/login" method="POST">

        <div class="form-group">
            <label>Username</label>
            <input type="username" name="username" placeholder="Enter your username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password">
        </div>

        <center>
        <!--<button class="btn-primary">Login</button>-->
        <button class="new" type="submit">
        <span class="button_top"> Login </span>
        </button>

        </center>
    </form>

    <div class="footer">
        Don't have an account?
        <a href="#" style="color:rgb(189, 237, 92)">Register</a>
    </div>

</div>

</body>
</html>
